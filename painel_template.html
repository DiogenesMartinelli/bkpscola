<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="300">
<title>Painel de Backups — Scola</title>
<style>
  :root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --ink-1: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --series: #2a78d6;
    --series-soft: #9ec5f4;
    --series-2: #1baf7a;
    --good: #0ca30c;
    --good-text: #006300;
    --warning: #fab219;
    --critical: #d03b3b;
    --pill-good-bg: rgba(12,163,12,0.12);
    --pill-warn-bg: rgba(250,178,25,0.18);
    --pill-crit-bg: rgba(208,59,59,0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --ink-1: #ffffff;
      --ink-2: #c3c2b7;
      --muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255,255,255,0.10);
      --series: #3987e5;
      --series-soft: #1c5cab;
      --series-2: #199e70;
      --good: #0ca30c;
      --good-text: #0ca30c;
      --warning: #fab219;
      --critical: #d03b3b;
      --pill-good-bg: rgba(12,163,12,0.18);
      --pill-warn-bg: rgba(250,178,25,0.14);
      --pill-crit-bg: rgba(208,59,59,0.20);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--page);
    color: var(--ink-1);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 24px 16px 48px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 16px; margin-bottom: 20px; }
  header h1 { font-size: 22px; font-weight: 650; }
  header .sub { color: var(--ink-2); font-size: 13px; }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .tile .lbl { font-size: 12px; color: var(--ink-2); margin-bottom: 6px; }
  .tile .val { font-size: 30px; font-weight: 650; line-height: 1.1; }
  .tile .val small { font-size: 15px; font-weight: 500; color: var(--ink-2); }
  .tile.ok .val { color: var(--good-text); }
  .tile.bad .val { color: var(--critical); }
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .chart-sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  svg { display: block; width: 100%; height: auto; }
  .clientes { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .cli-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 4px; }
  .cli-nome { font-size: 15px; font-weight: 650; overflow-wrap: anywhere; }
  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
  .pill.ok   { background: var(--pill-good-bg); color: var(--good-text); }
  .pill.warn { background: var(--pill-warn-bg); color: var(--ink-1); }
  .pill.crit { background: var(--pill-crit-bg); color: var(--critical); }
  .cli-meta { font-size: 12.5px; color: var(--ink-2); margin-bottom: 12px; }
  .grade { border-collapse: collapse; margin-bottom: 10px; }
  .grade th { font-size: 11px; color: var(--muted); font-weight: 500; padding: 2px 8px; text-align: center; }
  .grade td { text-align: center; padding: 3px 8px; }
  .grade td.rot { font-size: 11px; color: var(--muted); text-align: left; padding-left: 0; }
  .dot { display: inline-block; width: 13px; height: 13px; border-radius: 50%; }
  .dot.feito { background: var(--good); }
  .dot.falta { background: transparent; border: 2px solid var(--baseline); }
  .dot.futuro { background: transparent; border: 2px dotted var(--grid); }
  .legenda { font-size: 11.5px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 4px; }
  .legenda span { display: inline-flex; align-items: center; gap: 5px; }
  .legenda .dot { width: 10px; height: 10px; }
  details { margin-top: 10px; }
  summary { font-size: 12.5px; color: var(--series); cursor: pointer; }
  table.arqs { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12.5px; }
  table.arqs th { text-align: left; color: var(--muted); font-weight: 500; padding: 4px 6px; border-bottom: 1px solid var(--grid); }
  table.arqs td { padding: 4px 6px; border-bottom: 1px solid var(--grid); color: var(--ink-2); }
  table.arqs td.num { text-align: right; font-variant-numeric: tabular-nums; }
  #tooltip {
    position: fixed; pointer-events: none; display: none; z-index: 10;
    background: var(--ink-1); color: var(--page);
    font-size: 12px; padding: 5px 9px; border-radius: 6px; white-space: nowrap;
  }
  .vazio { text-align: center; padding: 48px 16px; color: var(--ink-2); font-size: 15px; }
  .erro-banner {
    background: var(--pill-crit-bg); color: var(--critical);
    border: 1px solid var(--critical); border-radius: 10px;
    padding: 10px 14px; font-size: 13.5px; font-weight: 600; margin-bottom: 16px;
  }
  footer { margin-top: 24px; font-size: 12px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Painel de Backups — Scola</h1>
    <span class="sub" id="gerado-em"></span>
  </header>
  <div id="conteudo"></div>
  <footer>Este painel consulta o Google Drive e se atualiza automaticamente. Retenção: os backups dos últimos 3 dias ficam no Drive; os mais antigos são removidos.</footer>
</div>
<div id="tooltip"></div>
<script>
const DADOS = __DADOS__;

const fmtMB = b => b >= 1024*1024*1024 ? (b/1024/1024/1024).toFixed(2) + ' GB'
              : b >= 1024*1024 ? (b/1024/1024).toFixed(1) + ' MB'
              : (b/1024).toFixed(0) + ' KB';
const DIAS_SEM = ['dom','seg','ter','qua','qui','sex','sáb'];
const dkey = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
const hoje = new Date(); hoje.setHours(0,0,0,0);

document.getElementById('gerado-em').textContent = 'atualizado em ' + DADOS.geradoEm;

const tooltip = document.getElementById('tooltip');
function mostraTip(ev, txt) {
  tooltip.textContent = txt;
  tooltip.style.display = 'block';
  tooltip.style.left = Math.min(ev.clientX + 12, window.innerWidth - 160) + 'px';
  tooltip.style.top = (ev.clientY - 34) + 'px';
}
function escondeTip() { tooltip.style.display = 'none'; }

// ---- agrupa arquivos por cliente ----
const clientes = {};
for (const a of (DADOS.arquivos || [])) {
  const partes = a.p.split('/');
  if (partes.length < 2) continue;               // arquivo solto na raiz
  const cli = partes[0];
  if (!clientes[cli]) clientes[cli] = [];
  const m = new Date(a.m);
  const per = (a.p.match(/_p([123])\.(rar|zip)$/i) || [])[1] || null;
  clientes[cli].push({ nome: partes[partes.length-1], size: a.s, mod: m, per });
}
const nomes = Object.keys(clientes).sort();
const cont = document.getElementById('conteudo');

if (DADOS.erro) {
  cont.insertAdjacentHTML('beforeend',
    '<div class="erro-banner">Não foi possível consultar o Google Drive na última atualização — os dados abaixo podem estar desatualizados. Verifique a internet e veja painel_erros.log.</div>');
}

if (!nomes.length) {
  cont.insertAdjacentHTML('beforeend',
    '<div class="card vazio">Nenhum backup encontrado no Google Drive ainda.<br>Assim que um cliente enviar o primeiro backup, ele aparece aqui.</div>');
} else {
  render();
}

function statusDe(horas) {
  if (horas <= 12) return { cls:'ok',   icone:'✓', rotulo:'Em dia' };
  if (horas <= 36) return { cls:'warn', icone:'⚠', rotulo:'Atrasado' };
  return { cls:'crit', icone:'✕', rotulo:'Sem backup recente' };
}

function render() {
  // ---- estatísticas gerais ----
  let totalBytes = 0, totalArqs = 0, emDia = 0, problema = 0;
  const infoCli = nomes.map(n => {
    const arqs = clientes[n];
    const ultimo = new Date(Math.max(...arqs.map(a => a.mod)));
    const horas = (Date.now() - ultimo) / 3600000;
    const st = statusDe(horas);
    if (st.cls === 'ok') emDia++; else problema++;
    const bytes = arqs.reduce((s,a) => s + a.size, 0);
    totalBytes += bytes; totalArqs += arqs.length;
    return { nome: n, arqs, ultimo, horas, st, bytes };
  });

  cont.insertAdjacentHTML('beforeend', `
    <div class="tiles">
      <div class="card tile"><div class="lbl">Clientes</div><div class="val">${nomes.length}</div></div>
      <div class="card tile ok"><div class="lbl">Em dia (últimas 12h)</div><div class="val">${emDia}</div></div>
      <div class="card tile ${problema ? 'bad' : ''}"><div class="lbl">Com atraso</div><div class="val">${problema}</div></div>
      <div class="card tile"><div class="lbl">No Drive agora</div><div class="val">${fmtMB(totalBytes)} <small>· ${totalArqs} arquivos</small></div></div>
    </div>`);

  // ---- séries por dia (últimos 7 dias) ----
  const dias = [];
  for (let i = 6; i >= 0; i--) { const d = new Date(hoje); d.setDate(d.getDate()-i); dias.push(d); }
  const porDia = dias.map(d => ({ d, n: 0, bytes: 0 }));
  for (const n of nomes) for (const a of clientes[n]) {
    const k = dkey(a.mod);
    const slot = porDia.find(x => dkey(x.d) === k);
    if (slot) { slot.n++; slot.bytes += a.size; }
  }

  cont.insertAdjacentHTML('beforeend', `
    <div class="charts">
      <div class="card">
        <div class="chart-title">Backups recebidos por dia</div>
        <div class="chart-sub">últimos 7 dias · todos os clientes · retenção apaga dias antigos</div>
        ${grafBarras(porDia.map(x => ({ rot: DIAS_SEM[x.d.getDay()] + ' ' + String(x.d.getDate()).padStart(2,'0'), v: x.n })), v => v + (v === 1 ? ' backup' : ' backups'), 'var(--series)')}
      </div>
      <div class="card">
        <div class="chart-title">Volume enviado por dia</div>
        <div class="chart-sub">últimos 7 dias · tamanho somado dos arquivos</div>
        ${grafBarras(porDia.map(x => ({ rot: DIAS_SEM[x.d.getDay()] + ' ' + String(x.d.getDate()).padStart(2,'0'), v: Math.round(x.bytes/1024/1024*10)/10 })), v => fmtMB(v*1024*1024), 'var(--series-2)', v => fmtMB(v*1024*1024))}
      </div>
    </div>`);

  // ---- cartões por cliente ----
  const cards = infoCli.map(c => {
    const quando = c.horas < 1 ? 'há menos de 1 hora'
                 : c.horas < 48 ? 'há ' + Math.round(c.horas) + ' h'
                 : 'há ' + Math.round(c.horas/24) + ' dias';
    return `
    <div class="card">
      <div class="cli-head">
        <div class="cli-nome">${c.nome}</div>
        <span class="pill ${c.st.cls}">${c.st.icone} ${c.st.rotulo}</span>
      </div>
      <div class="cli-meta">Último backup: <b>${c.ultimo.toLocaleDateString('pt-BR')} ${c.ultimo.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</b> (${quando}) · ${c.arqs.length} ${c.arqs.length === 1 ? 'arquivo' : 'arquivos'} · ${fmtMB(c.bytes)}</div>
      ${grade(c.arqs)}
      <div class="legenda">
        <span><span class="dot feito"></span> feito</span>
        <span><span class="dot falta"></span> faltou</span>
        <span><span class="dot futuro"></span> ainda não chegou a hora</span>
      </div>
      <details>
        <summary>Ver arquivos no Drive</summary>
        <table class="arqs">
          <tr><th>Arquivo</th><th style="text-align:right">Tamanho</th><th style="text-align:right">Enviado em</th></tr>
          ${c.arqs.sort((a,b) => b.mod - a.mod).map(a => `
            <tr><td>${a.nome}</td><td class="num">${fmtMB(a.size)}</td>
            <td class="num">${a.mod.toLocaleDateString('pt-BR')} ${a.mod.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</td></tr>`).join('')}
        </table>
      </details>
    </div>`;
  }).join('');
  cont.insertAdjacentHTML('beforeend', '<div class="clientes">' + cards + '</div>');

  // hover dos gráficos
  document.querySelectorAll('[data-tip]').forEach(el => {
    el.addEventListener('mousemove', ev => mostraTip(ev, el.dataset.tip));
    el.addEventListener('mouseleave', escondeTip);
  });
}

// grade: últimos 4 dias × períodos 1..3 + manuais
function grade(arqs) {
  const dias4 = [];
  for (let i = 3; i >= 0; i--) { const d = new Date(hoje); d.setDate(d.getDate()-i); dias4.push(d); }
  const agoraH = new Date().getHours();
  let manuais = 0;
  const feitos = {};
  for (const a of arqs) {
    if (!a.per) { manuais++; continue; }
    feitos[dkey(a.mod) + '_' + a.per] = true;
  }
  let head = '<tr><th></th>' + dias4.map(d => `<th>${DIAS_SEM[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}</th>`).join('') + '</tr>';
  let linhas = '';
  for (const p of ['1','2','3']) {
    linhas += `<tr><td class="rot">período ${p}</td>` + dias4.map(d => {
      const ehHoje = dkey(d) === dkey(hoje);
      const feito = feitos[dkey(d) + '_' + p];
      let cls = feito ? 'feito' : 'falta';
      // hoje: períodos futuros aproximados (p1 manhã, p2 tarde, p3 noite) ainda não venceram
      if (!feito && ehHoje && agoraH < ({'1':10,'2':15,'3':21})[p]) cls = 'futuro';
      const tip = `${DIAS_SEM[d.getDay()]} ${d.toLocaleDateString('pt-BR')} · período ${p}: ${cls === 'feito' ? 'backup recebido' : cls === 'futuro' ? 'ainda não chegou a hora' : 'não recebido'}`;
      return `<td><span class="dot ${cls}" data-tip="${tip}"></span></td>`;
    }).join('') + '</tr>';
  }
  return '<table class="grade">' + head + linhas + '</table>' +
    (manuais ? `<div class="legenda" style="margin-bottom:8px"><span>+ ${manuais} backup${manuais>1?'s':''} manual${manuais>1?'is':''} (sem período)</span></div>` : '');
}

// gráfico de barras SVG: topo arredondado 4px, hairlines, rótulo no maior valor e no último dia
function grafBarras(pontos, fmtVal, cor, fmtLbl) {
  fmtLbl = fmtLbl || (v => v);
  const W = 520, H = 190, padL = 34, padR = 8, padT = 18, padB = 26;
  const iw = W - padL - padR, ih = H - padT - padB;
  const max = Math.max(1, ...pontos.map(p => p.v));
  const bw = Math.min(44, iw / pontos.length - 8);
  const step = iw / pontos.length;
  const idxMax = pontos.reduce((im,p,i) => p.v > pontos[im].v ? i : im, 0);

  let g = '';
  // gridlines (3 hairlines) + rótulos do eixo
  for (let i = 1; i <= 3; i++) {
    const val = max * i / 3, y = padT + ih - ih * i / 3;
    g += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>`;
    g += `<text x="${padL-6}" y="${y+3.5}" text-anchor="end" font-size="10" fill="var(--muted)">${val >= 100 ? Math.round(val) : Math.round(val*10)/10}</text>`;
  }
  // baseline
  g += `<line x1="${padL}" y1="${padT+ih}" x2="${W-padR}" y2="${padT+ih}" stroke="var(--baseline)" stroke-width="1"/>`;

  pontos.forEach((p, i) => {
    const cx = padL + step * i + step / 2;
    const h = Math.round(ih * p.v / max);
    const x = cx - bw / 2, y = padT + ih - h;
    if (p.v > 0) {
      const r = Math.min(4, h);
      g += `<path d="M${x},${padT+ih} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+bw-r},${y} Q${x+bw},${y} ${x+bw},${y+r} L${x+bw},${padT+ih} Z" fill="${cor}"/>`;
    }
    // rótulo direto seletivo: maior valor e último dia
    if (p.v > 0 && (i === idxMax || i === pontos.length - 1))
      g += `<text x="${cx}" y="${y-5}" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ink-2)">${fmtLbl(p.v)}</text>`;
    g += `<text x="${cx}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${p.rot}</text>`;
    // área de hover maior que a marca
    g += `<rect x="${padL + step*i}" y="${padT}" width="${step}" height="${ih}" fill="transparent" data-tip="${p.rot}: ${fmtVal(p.v)}"/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" role="img">${g}</svg>`;
}
</script>
</body>
</html>
