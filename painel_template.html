<style>
  /* ===== tema claro (padrao) ===== */
  :root, :root[data-theme="light"] {
    --page-grad: linear-gradient(160deg, #f2f7f9 0%, #e7f0f5 55%, #dcebf2 100%);
    --surface-1: #ffffff;
    --ink-1: #0f2430;
    --ink-2: #44606c;
    --muted: #7b95a0;
    --grid: #dfe9ee;
    --baseline: #b9ccd5;
    --border: rgba(14, 66, 88, 0.12);
    --sombra: 0 1px 2px rgba(10,40,54,.05), 0 10px 28px rgba(10,40,54,.09);
    --petrol-grad: linear-gradient(135deg, #0e4258 0%, #155a75 45%, #2387ab 100%);
    --brilho: radial-gradient(120% 150% at 85% -30%, rgba(140,210,235,.38), transparent 55%);
    --acento: #14566f;
    --g1-a: #14566f; --g1-b: #2b87a8;
    --g2-a: #0e8a5f; --g2-b: #22bd85;
    --series: #1b6b8a;
    --series-2: #12946a;
    --good: #0ca30c; --good-text: #006300;
    --warning: #fab219; --critical: #d03b3b;
    --pill-good-bg: rgba(12,163,12,0.12);
    --pill-warn-bg: rgba(250,178,25,0.18);
    --pill-crit-bg: rgba(208,59,59,0.10);
    --header-bg: linear-gradient(135deg, #ffffff 0%, #ecf4f8 100%);
    --header-ink: #0e3a4d;
    --header-sub: #4a6a77;
    --header-borda: rgba(14,66,88,.35);
    --header-btnbg: rgba(14,66,88,.06);
    --header-btnhover: rgba(14,66,88,.14);
    --header-anel: rgba(14,66,88,.18);
  }
  /* ===== tema escuro ===== */
  :root[data-theme="dark"] {
    --page-grad: linear-gradient(160deg, #06161d 0%, #0a2530 50%, #0d3040 100%);
    --surface-1: #102d3a;
    --ink-1: #eaf4f8;
    --ink-2: #a9c5d0;
    --muted: #7194a2;
    --grid: #1d3e4d;
    --baseline: #2d5060;
    --border: rgba(127, 196, 220, 0.14);
    --sombra: 0 1px 2px rgba(0,0,0,.28), 0 12px 32px rgba(0,0,0,.38);
    --petrol-grad: linear-gradient(135deg, #0b3547 0%, #12506a 45%, #1e7d9f 100%);
    --brilho: radial-gradient(120% 150% at 85% -30%, rgba(127,196,220,.25), transparent 55%);
    --acento: #55b3d2;
    --g1-a: #1e7d9f; --g1-b: #4fb0d2;
    --g2-a: #12916a; --g2-b: #2ec48f;
    --series: #4fb0d2;
    --series-2: #2ec48f;
    --good: #21b421; --good-text: #4fd06f;
    --warning: #fab219; --critical: #e05252;
    --pill-good-bg: rgba(33,180,33,0.16);
    --pill-warn-bg: rgba(250,178,25,0.14);
    --pill-crit-bg: rgba(224,82,82,0.16);
    --header-bg: linear-gradient(135deg, #0b3547 0%, #12506a 45%, #1e7d9f 100%);
    --header-ink: #f0f8fb;
    --header-sub: rgba(214,236,244,.80);
    --header-borda: rgba(255,255,255,.35);
    --header-btnbg: rgba(255,255,255,.10);
    --header-btnhover: rgba(255,255,255,.22);
    --header-anel: rgba(255,255,255,.22);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { min-height: 100%; }
  body {
    background: var(--page-grad) fixed;
    color: var(--ink-1);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 22px 16px 48px;
    min-height: 100vh;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  /* ===== cabecalho em degrade petroleo ===== */
  header {
    position: relative; overflow: hidden;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px;
    background: var(--header-bg);
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 20px;
    box-shadow: var(--sombra);
  }
  header::before { content: ''; position: absolute; inset: 0; background: var(--brilho); pointer-events: none; }
  header > * { position: relative; }
  header h1 { font-size: 21px; font-weight: 650; color: var(--header-ink); letter-spacing: .2px; }
  header .sub { color: var(--header-sub); font-size: 12.5px; }
  header .logo { width: 44px; height: 44px; border-radius: 11px; box-shadow: 0 2px 10px rgba(0,0,0,.25), 0 0 0 2px var(--header-anel); }
  #sair { margin-left: auto; }
  #sair a { color: var(--header-ink); font-size: 12.5px; text-decoration: none; opacity: .85; border: 1px solid var(--header-borda); border-radius: 999px; padding: 4px 12px; }
  #sair a:hover { opacity: 1; background: var(--header-btnhover); }
  #tema-btn {
    margin-left: 8px; width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--header-borda); background: var(--header-btnbg);
    color: var(--header-ink); font-size: 16px; cursor: pointer; line-height: 1;
    transition: background .2s, transform .2s;
  }
  #tema-btn:hover { background: var(--header-btnhover); transform: rotate(15deg); }
  /* ===== cartoes ===== */
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--sombra);
  }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .tile { position: relative; overflow: hidden; }
  .tile::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--petrol-grad); }
  .tile .lbl { font-size: 12px; color: var(--ink-2); margin-bottom: 6px; }
  .tile .val { font-size: 30px; font-weight: 650; line-height: 1.1; }
  .tile .val small { font-size: 15px; font-weight: 500; color: var(--ink-2); }
  .tile.ok .val { color: var(--good-text); }
  .tile.bad .val { color: var(--critical); }
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .chart-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .chart-sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  svg { display: block; width: 100%; height: auto; }
  .clientes { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .clientes .card { transition: transform .15s, box-shadow .15s; }
  .clientes .card:hover { transform: translateY(-2px); }
  .cli-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 4px; }
  .cli-nome { font-size: 15px; font-weight: 650; overflow-wrap: anywhere; }
  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
  .pill.ok   { background: var(--pill-good-bg); color: var(--good-text); }
  .pill.warn { background: var(--pill-warn-bg); color: var(--ink-1); }
  .pill.crit { background: var(--pill-crit-bg); color: var(--critical); }
  .cli-meta { font-size: 12.5px; color: var(--ink-2); margin-bottom: 12px; }
  .grade { border-collapse: collapse; margin-bottom: 10px; }
  .grade th { font-size: 11px; color: var(--muted); font-weight: 500; padding: 2px 8px; text-align: center; }
  .grade td { text-align: center; padding: 3px 8px; }
  .grade td.rot { font-size: 11px; color: var(--muted); text-align: left; padding-left: 0; }
  .dot { display: inline-block; width: 13px; height: 13px; border-radius: 50%; }
  .dot.feito { background: var(--good); box-shadow: 0 0 6px rgba(18,180,60,.45); }
  .dot.falta { background: transparent; border: 2px solid var(--baseline); }
  .dot.futuro { background: transparent; border: 2px dotted var(--grid); }
  .legenda { font-size: 11.5px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 4px; }
  .legenda span { display: inline-flex; align-items: center; gap: 5px; }
  .legenda .dot { width: 10px; height: 10px; }
  details { margin-top: 10px; }
  summary { font-size: 12.5px; color: var(--acento); cursor: pointer; }
  table.arqs { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12.5px; }
  table.arqs th { text-align: left; color: var(--muted); font-weight: 500; padding: 4px 6px; border-bottom: 1px solid var(--grid); }
  table.arqs td { padding: 4px 6px; border-bottom: 1px solid var(--grid); color: var(--ink-2); }
  table.arqs td.num { text-align: right; font-variant-numeric: tabular-nums; }
  a.arq-link { color: var(--acento); text-decoration: none; }
  a.arq-link:hover { text-decoration: underline; }
  #tooltip {
    position: fixed; pointer-events: none; display: none; z-index: 10;
    background: var(--ink-1); color: var(--surface-1);
    font-size: 12px; padding: 5px 9px; border-radius: 6px; white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  .vazio { text-align: center; padding: 48px 16px; color: var(--ink-2); font-size: 15px; }
  .erro-banner {
    background: var(--pill-crit-bg); color: var(--critical);
    border: 1px solid var(--critical); border-radius: 10px;
    padding: 10px 14px; font-size: 13.5px; font-weight: 600; margin-bottom: 16px;
  }
  footer { margin-top: 24px; font-size: 12px; color: var(--muted); text-align: center; }
  /* ===== tela de login ===== */
  #login { display: none; min-height: 96vh; align-items: center; justify-content: center; padding: 24px 16px; }
  .login-card { position: relative; overflow: hidden; width: 100%; max-width: 370px; text-align: center; padding: 30px 26px 26px; }
  .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--petrol-grad); }
  .login-card h2 {
    font-size: 21px; font-weight: 700; margin-bottom: 4px;
    background: var(--petrol-grad); -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  :root[data-theme="dark"] .login-card h2 { background: linear-gradient(135deg, #7fc4dc, #d6ecf4); -webkit-background-clip: text; background-clip: text; }
  .login-card .sub2 { font-size: 13px; color: var(--ink-2); margin-bottom: 16px; }
  .login-card label { display: block; text-align: left; font-size: 12px; color: var(--ink-2); margin: 10px 0 4px; }
  .login-card input {
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid var(--baseline); border-radius: 9px;
    background: transparent; color: var(--ink-1);
    transition: border-color .2s, box-shadow .2s;
  }
  .login-card input:focus { outline: none; border-color: var(--acento); box-shadow: 0 0 0 3px rgba(43,135,168,.18); }
  .login-card button {
    width: 100%; margin-top: 18px; padding: 11px; font-size: 14px; font-weight: 600;
    color: #fff; background: var(--petrol-grad); border: 0; border-radius: 9px; cursor: pointer;
    box-shadow: 0 4px 14px rgba(14,66,88,.35);
    transition: filter .2s, transform .1s;
  }
  .login-card button:hover { filter: brightness(1.12); }
  .login-card button:active { transform: scale(.99); }
  #lg-msg { min-height: 18px; margin-top: 10px; font-size: 12.5px; color: var(--critical); }
</style>
</head>

    <h2>Painel de Backups — Scola</h2>
    <div class="sub2">Acesso restrito · entre com seu e-mail e senha</div>
    <label for="lg-email">E-mail</label>
    <input id="lg-email" type="email" autocomplete="username">
    <label for="lg-senha">Senha</label>
    <input id="lg-senha" type="password" autocomplete="current-password">
    <button id="lg-entrar">Entrar</button>
    <div id="lg-msg"></div>
  </div>
</div>

    <h1>Painel de Backups — Scola</h1>
    <span class="sub" id="gerado-em"></span>
    <span class="sub" id="sair" style="display:none"><a href="#" id="sair-link">sair</a></span>
    <button id="tema-btn" title="Alternar tema claro/escuro">🌙</button>
  </header>
  <div id="conteudo"></div>
  <footer>Este painel consulta o Google Drive e se atualiza automaticamente. Retenção: os backups dos últimos 3 dias ficam no Drive; os mais antigos são removidos.</footer>
</div>
<div id="tooltip"></div>
<script>
const DADOS = __DADOS__;

const fmtMB = b => b >= 1024*1024*1024 ? (b/1024/1024/1024).toFixed(2) + ' GB'
              : b >= 1024*1024 ? (b/1024/1024).toFixed(1) + ' MB'
              : (b/1024).toFixed(0) + ' KB';
const DIAS_SEM = ['dom','seg','ter','qua','qui','sex','sáb'];
const dkey = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
const hoje = new Date(); hoje.setHours(0,0,0,0);

const tooltip = document.getElementById('tooltip');
function mostraTip(ev, txt) {
  tooltip.textContent = txt;
  tooltip.style.display = 'block';
  tooltip.style.left = Math.min(ev.clientX + 12, window.innerWidth - 160) + 'px';
  tooltip.style.top = (ev.clientY - 34) + 'px';
}
function escondeTip() { tooltip.style.display = 'none'; }

// ---- inicia o painel com um conjunto de dados (local: embutido; site: após login) ----
const cont = document.getElementById('conteudo');
let clientes = {}, nomes = [];

function iniciar(dados) {
  document.getElementById('login').style.display = 'none';
  document.querySelector('.wrap').style.display = '';
  document.getElementById('gerado-em').textContent =
    'atualizado em ' + dados.geradoEm + (dados.admin ? ' · administrador' : '');
  cont.innerHTML = '';
  clientes = {};
  for (const a of (dados.arquivos || [])) {
    const partes = a.p.split('/');
    if (partes.length < 2) continue;               // arquivo solto na raiz
    const cli = partes[0];
    if (!clientes[cli]) clientes[cli] = [];
    const dt = new Date(a.m);
    // período: usa o _pN do nome se existir; senão classifica pelo horário do envio
    const mp = a.p.match(/_p([123])\.(rar|zip)$/i);
    const per = mp ? mp[1] : (dt.getHours() < 12 ? '1' : dt.getHours() < 18 ? '2' : '3');
    clientes[cli].push({ nome: partes[partes.length-1], size: a.s, mod: dt, per, url: a.u || '' });
  }
  // pastas criadas no Drive que ainda nao receberam nenhum arquivo
  for (const p of (dados.pastas || [])) if (!clientes[p]) clientes[p] = [];
  nomes = Object.keys(clientes).sort();
  if (dados.erro) {
    cont.insertAdjacentHTML('beforeend',
      '<div class="erro-banner">Não foi possível consultar o Google Drive na última atualização — os dados abaixo podem estar desatualizados.</div>');
  }
  if (!nomes.length) {
    cont.insertAdjacentHTML('beforeend',
      '<div class="card vazio">Nenhum backup encontrado no Google Drive ainda.<br>Assim que um cliente enviar o primeiro backup, ele aparece aqui.</div>');
  } else {
    render();
  }
}

function statusDe(horas) {
  if (horas <= 12) return { cls:'ok',   icone:'✓', rotulo:'Em dia' };
  if (horas <= 36) return { cls:'warn', icone:'⚠', rotulo:'Atrasado' };
  return { cls:'crit', icone:'✕', rotulo:'Sem backup recente' };
}

function render() {
  // ---- estatísticas gerais ----
  let totalBytes = 0, totalArqs = 0, emDia = 0, problema = 0;
  const infoCli = nomes.map(n => {
    const arqs = clientes[n];
    const ultimo = arqs.length ? new Date(Math.max(...arqs.map(a => a.mod))) : null;
    const horas = ultimo ? (Date.now() - ultimo) / 3600000 : Infinity;
    const st = arqs.length ? statusDe(horas) : { cls:'warn', icone:'◌', rotulo:'Aguardando 1º backup' };
    if (arqs.length) { if (st.cls === 'ok') emDia++; else problema++; }
    const bytes = arqs.reduce((s,a) => s + a.size, 0);
    totalBytes += bytes; totalArqs += arqs.length;
    return { nome: n, arqs, ultimo, horas, st, bytes };
  });

  cont.insertAdjacentHTML('beforeend', `
    <div class="tiles">
      <div class="card tile"><div class="lbl">Clientes</div><div class="val">${nomes.length}</div></div>
      <div class="card tile ok"><div class="lbl">Em dia (últimas 12h)</div><div class="val">${emDia}</div></div>
      <div class="card tile ${problema ? 'bad' : ''}"><div class="lbl">Com atraso</div><div class="val">${problema}</div></div>
      <div class="card tile"><div class="lbl">No Drive agora</div><div class="val">${fmtMB(totalBytes)} <small>· ${totalArqs} arquivos</small></div></div>
    </div>`);

  // ---- séries por dia (últimos 7 dias) ----
  const dias = [];
  for (let i = 6; i >= 0; i--) { const d = new Date(hoje); d.setDate(d.getDate()-i); dias.push(d); }
  const porDia = dias.map(d => ({ d, n: 0, bytes: 0 }));
  for (const n of nomes) for (const a of clientes[n]) {
    const k = dkey(a.mod);
    const slot = porDia.find(x => dkey(x.d) === k);
    if (slot) { slot.n++; slot.bytes += a.size; }
  }

  cont.insertAdjacentHTML('beforeend', `
    <div class="charts">
      <div class="card">
        <div class="chart-title">Backups recebidos por dia</div>
        <div class="chart-sub">últimos 7 dias · todos os clientes · retenção apaga dias antigos</div>
        ${grafBarras(porDia.map(x => ({ rot: DIAS_SEM[x.d.getDay()] + ' ' + String(x.d.getDate()).padStart(2,'0'), v: x.n })), v => v + (v === 1 ? ' backup' : ' backups'), 'g1')}
      </div>
      <div class="card">
        <div class="chart-title">Volume enviado por dia</div>
        <div class="chart-sub">últimos 7 dias · tamanho somado dos arquivos</div>
        ${grafBarras(porDia.map(x => ({ rot: DIAS_SEM[x.d.getDay()] + ' ' + String(x.d.getDate()).padStart(2,'0'), v: Math.round(x.bytes/1024/1024*10)/10 })), v => fmtMB(v*1024*1024), 'g2', v => fmtMB(v*1024*1024))}
      </div>
    </div>`);

  // ---- cartões por cliente ----
  const cards = infoCli.map(c => {
    const quando = c.horas < 1 ? 'há menos de 1 hora'
                 : c.horas < 48 ? 'há ' + Math.round(c.horas) + ' h'
                 : 'há ' + Math.round(c.horas/24) + ' dias';
    return `
    <div class="card">
      <div class="cli-head">
        <div class="cli-nome">${c.nome}</div>
        <span class="pill ${c.st.cls}">${c.st.icone} ${c.st.rotulo}</span>
      </div>
      <div class="cli-meta">${c.ultimo
        ? `Último backup: <b>${c.ultimo.toLocaleDateString('pt-BR')} ${c.ultimo.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</b> (${quando}) · ${c.arqs.length} ${c.arqs.length === 1 ? 'arquivo' : 'arquivos'} · ${fmtMB(c.bytes)}`
        : 'Pasta criada no Drive — nenhum backup recebido ainda'}</div>
      ${grade(c.arqs)}
      <div class="legenda">
        <span><span class="dot feito"></span> feito</span>
        <span><span class="dot falta"></span> faltou</span>
        <span><span class="dot futuro"></span> ainda não chegou a hora</span>
      </div>
      ${c.arqs.length ? `<details>
        <summary>Ver arquivos no Drive</summary>
        <table class="arqs">
          <tr><th>Arquivo</th><th style="text-align:right">Tamanho</th><th style="text-align:right">Enviado em</th></tr>
          ${c.arqs.sort((a,b) => b.mod - a.mod).map(a => `
            <tr><td>${a.url ? '<a class="arq-link" href="' + a.url + '" target="_blank" rel="noopener" title="Abrir/baixar este backup no Google Drive">' + a.nome + '</a>' : a.nome}</td><td class="num">${fmtMB(a.size)}</td>
            <td class="num">${a.mod.toLocaleDateString('pt-BR')} ${a.mod.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</td></tr>`).join('')}
        </table>
      </details>` : ''}
    </div>`;
  }).join('');
  cont.insertAdjacentHTML('beforeend', '<div class="clientes">' + cards + '</div>');

  // hover dos gráficos
  document.querySelectorAll('[data-tip]').forEach(el => {
    el.addEventListener('mousemove', ev => mostraTip(ev, el.dataset.tip));
    el.addEventListener('mouseleave', escondeTip);
  });
}

// grade: últimos 4 dias × períodos matutino / vespertino / noturno
function grade(arqs) {
  const dias4 = [];
  for (let i = 3; i >= 0; i--) { const d = new Date(hoje); d.setDate(d.getDate()-i); dias4.push(d); }
  const agoraH = new Date().getHours();
  const PERIODOS = [
    { p: '1', rot: 'matutino',   fim: 12 },
    { p: '2', rot: 'vespertino', fim: 18 },
    { p: '3', rot: 'noturno',    fim: 24 }
  ];
  const feitos = {};
  for (const a of arqs) feitos[dkey(a.mod) + '_' + a.per] = true;
  let head = '<tr><th></th>' + dias4.map(d => `<th>${DIAS_SEM[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}</th>`).join('') + '</tr>';
  let linhas = '';
  for (const per of PERIODOS) {
    linhas += `<tr><td class="rot">${per.rot}</td>` + dias4.map(d => {
      const ehHoje = dkey(d) === dkey(hoje);
      const feito = feitos[dkey(d) + '_' + per.p];
      // hoje inteiro conta como "ainda pode chegar"; so vira "faltou" no dia seguinte
      let cls = feito ? 'feito' : (ehHoje ? 'futuro' : 'falta');
      const tip = `${DIAS_SEM[d.getDay()]} ${d.toLocaleDateString('pt-BR')} · ${per.rot}: ${cls === 'feito' ? 'backup recebido' : cls === 'futuro' ? 'ainda não chegou a hora' : 'não recebido'}`;
      return `<td><span class="dot ${cls}" data-tip="${tip}"></span></td>`;
    }).join('') + '</tr>';
  }
  return '<table class="grade">' + head + linhas + '</table>';
}

// gráfico de barras SVG: topo arredondado 4px, hairlines, rótulo no maior valor e no último dia
function grafBarras(pontos, fmtVal, grad, fmtLbl) {
  fmtLbl = fmtLbl || (v => v);
  const W = 520, H = 190, padL = 34, padR = 8, padT = 18, padB = 26;
  const iw = W - padL - padR, ih = H - padT - padB;
  const max = Math.max(1, ...pontos.map(p => p.v));
  const bw = Math.min(44, iw / pontos.length - 8);
  const step = iw / pontos.length;
  const idxMax = pontos.reduce((im,p,i) => p.v > pontos[im].v ? i : im, 0);

  let g = `<defs><linearGradient id="${grad}" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="var(--${grad}-a)"/><stop offset="1" stop-color="var(--${grad}-b)"/></linearGradient></defs>`;
  // gridlines (3 hairlines) + rótulos do eixo
  for (let i = 1; i <= 3; i++) {
    const val = max * i / 3, y = padT + ih - ih * i / 3;
    g += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>`;
    g += `<text x="${padL-6}" y="${y+3.5}" text-anchor="end" font-size="10" fill="var(--muted)">${val >= 100 ? Math.round(val) : Math.round(val*10)/10}</text>`;
  }
  // baseline
  g += `<line x1="${padL}" y1="${padT+ih}" x2="${W-padR}" y2="${padT+ih}" stroke="var(--baseline)" stroke-width="1"/>`;

  pontos.forEach((p, i) => {
    const cx = padL + step * i + step / 2;
    const h = Math.round(ih * p.v / max);
    const x = cx - bw / 2, y = padT + ih - h;
    if (p.v > 0) {
      const r = Math.min(4, h);
      g += `<path d="M${x},${padT+ih} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+bw-r},${y} Q${x+bw},${y} ${x+bw},${y+r} L${x+bw},${padT+ih} Z" fill="url(#${grad})"/>`;
    }
    // rótulo direto seletivo: maior valor e último dia
    if (p.v > 0 && (i === idxMax || i === pontos.length - 1))
      g += `<text x="${cx}" y="${y-5}" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ink-2)">${fmtLbl(p.v)}</text>`;
    g += `<text x="${cx}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${p.rot}</text>`;
    // área de hover maior que a marca
    g += `<rect x="${padL + step*i}" y="${padT}" width="${step}" height="${ih}" fill="transparent" data-tip="${p.rot}: ${fmtVal(p.v)}"/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" role="img">${g}</svg>`;
}

// ===== login do site publicado: baixa dados/<id>.bin e descriptografa com a senha =====
// (mesmo esquema do gerar_site.py: PBKDF2-SHA256 200k iterações + AES-256-GCM)
const hex = buf => [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
const enc8 = s => new TextEncoder().encode(s);

async function idDe(email) {
  return hex(await crypto.subtle.digest('SHA-256', enc8(email))).slice(0, 24);
}
async function chaveDe(email, senha) {
  const salt = (await crypto.subtle.digest('SHA-256', enc8('sal:' + email))).slice(0, 16);
  const base = await crypto.subtle.importKey('raw', enc8(senha), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, true, ['decrypt']);
}
async function abrirDados(uid, chave) {
  const r = await fetch('dados/' + uid + '.bin?v=' + Date.now());
  if (!r.ok) throw new Error('nao-encontrado');
  const buf = await r.arrayBuffer();
  const plano = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: buf.slice(0, 12) }, chave, buf.slice(12));
  return JSON.parse(new TextDecoder().decode(plano));
}
async function fazerLogin() {
  const email = document.getElementById('lg-email').value.trim().toLowerCase();
  const senha = document.getElementById('lg-senha').value;
  const msg = document.getElementById('lg-msg');
  if (!email || !senha) { msg.textContent = 'Preencha e-mail e senha.'; return; }
  msg.textContent = 'Verificando...';
  try {
    const uid = await idDe(email);
    const chave = await chaveDe(email, senha);
    const dados = await abrirDados(uid, chave);
    localStorage.setItem('painel_sessao', JSON.stringify({ uid, k: hex(await crypto.subtle.exportKey('raw', chave)) }));
    document.getElementById('sair').style.display = '';
    iniciar(dados);
  } catch (e) {
    msg.textContent = 'E-mail ou senha incorretos.';
  }
}
async function tentarSessao() {
  try {
    const s = JSON.parse(localStorage.getItem('painel_sessao'));
    if (!s || !s.uid || !s.k) return false;
    const bytes = new Uint8Array(s.k.match(/../g).map(h => parseInt(h, 16)));
    const chave = await crypto.subtle.importKey('raw', bytes, 'AES-GCM', true, ['decrypt']);
    const dados = await abrirDados(s.uid, chave);
    document.getElementById('sair').style.display = '';
    iniciar(dados);
    return true;
  } catch (e) { localStorage.removeItem('painel_sessao'); return false; }
}
document.getElementById('sair-link').addEventListener('click', e => {
  e.preventDefault();
  localStorage.removeItem('painel_sessao');
  location.reload();
});

// ===== alternar tema claro/escuro =====
const temaBtn = document.getElementById('tema-btn');
function atualizaIconeTema() {
  temaBtn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
}
temaBtn.addEventListener('click', () => {
  const novo = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', novo);
  try { localStorage.setItem('tema', novo); } catch (e) {}
  atualizaIconeTema();
});
atualizaIconeTema();

// ===== ponto de entrada =====
if (DADOS !== null) {
  iniciar(DADOS);                      // painel local: dados embutidos, sem login
} else {
  document.querySelector('.wrap').style.display = 'none';
  document.getElementById('lg-entrar').addEventListener('click', fazerLogin);
  document.getElementById('lg-email').addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
  document.getElementById('lg-senha').addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
  tentarSessao().then(ok => { if (!ok) document.getElementById('login').style.display = 'flex'; });
}
</script>
