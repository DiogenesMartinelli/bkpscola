name: Atualiza painel

on:
  schedule:
    - cron: '*/30 * * * *'   # a cada 30 minutos (horario UTC; pode atrasar alguns min)
  workflow_dispatch:          # permite rodar manualmente na aba Actions
  push:
    branches: [main]          # republica quando o codigo mudar

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  gerar-e-publicar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      TZ: America/Cuiaba
    steps:
      - uses: actions/checkout@v4

      - name: Instala dependencias
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rclone jq
          python3 -m pip install --quiet cryptography

      - name: Consulta o Google Drive e gera o site
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          USUARIOS: ${{ secrets.USUARIOS }}
        run: |
          if [ -z "$RCLONE_CONF" ]; then
            echo "ERRO: crie o secret RCLONE_CONF em Settings > Secrets and variables > Actions"
            exit 1
          fi
          if [ -z "$USUARIOS" ]; then
            echo "ERRO: crie o secret USUARIOS (uma linha por usuario: email;senha;PASTA ou email;senha;admin)"
            exit 1
          fi
          printf '%s' "$RCLONE_CONF" > rclone.conf
          export RCLONE_CONFIG=$PWD/rclone.conf
          rclone lsjson "gdrive:BackupSCOLA" -R --files-only > lista.json
          # link de compartilhamento de cada arquivo (clique no painel abre/baixa)
          : > links.txt
          jq -r '.[].Path' lista.json | while IFS= read -r p; do
            url=$(rclone link "gdrive:BackupSCOLA/$p" 2>/dev/null || true)
            printf '%s\t%s\n' "$p" "$url" >> links.txt
          done
          jq -R -s 'split("\n") | map(select(length > 0) | split("\t") | {(.[0]): (.[1] // "")}) | add // {}' links.txt > links.json
          GERADO_EM=$(date '+%d/%m/%Y %H:%M') python3 gerar_site.py
          rm -f rclone.conf lista.json links.json links.txt

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
